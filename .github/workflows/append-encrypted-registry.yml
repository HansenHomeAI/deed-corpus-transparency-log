name: Append encrypted deed corpus custody event

on:
  workflow_dispatch:
    inputs:
      encrypted_request_base64url:
        description: RSA-OAEP/AES-GCM encrypted append intent (contains no caller nonce or timestamp)
        required: true
        type: string

permissions:
  actions: read
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: deed-corpus-encrypted-custody-registry
  cancel-in-progress: false

jobs:
  append:
    environment: deed-corpus-registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Refuse any unprotected or stale workflow ref
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = refs/heads/main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --quiet origin refs/heads/main
          test "$(git rev-parse FETCH_HEAD)" = "$GITHUB_SHA"

      - name: Materialize the request decryption key outside the repository
        shell: bash
        env:
          REQUEST_PRIVATE_KEY_PEM: ${{ secrets.DEED_REGISTRY_REQUEST_PRIVATE_KEY_PEM }}
        run: |
          set -euo pipefail
          umask 077
          test -n "$REQUEST_PRIVATE_KEY_PEM"
          printf '%s' "$REQUEST_PRIVATE_KEY_PEM" > "$RUNNER_TEMP/deed-registry-request-private.pem"

      - name: Resolve review seals only from exact protected hosted evidence
        env:
          GH_TOKEN: ${{ github.token }}
          ENCRYPTED_REQUEST_BASE64URL: ${{ inputs.encrypted_request_base64url }}
          REQUEST_KEY_ID: ${{ vars.DEED_REGISTRY_REQUEST_KEY_ID }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/deed-registry-review-proof"
          umask 077
          mkdir -p "$root"
          node scripts/extract-protected-review-reference.mjs \
            --request-private-key "$RUNNER_TEMP/deed-registry-request-private.pem" \
            --request-base64url "$ENCRYPTED_REQUEST_BASE64URL" --request-key-id "$REQUEST_KEY_ID" \
            --out "$root/reference.json"
          if jq -e '.required == true' "$root/reference.json" >/dev/null; then
            run_id="$(jq -er .reviewerWorkflowRunId "$root/reference.json")"
            attempt="$(jq -er .reviewerWorkflowRunAttempt "$root/reference.json")"
            tip="$(jq -er .verifierPolicyTip "$root/reference.json")"
            request_id="$(jq -er .reviewRequestId "$root/reference.json")"
            gh api "repos/HansenHomeAI/deed-corpus-transparency-log/actions/runs/$run_id" > "$root/run.json"
            jq -e --arg tip "$tip" --arg attempt "$attempt" \
              '.event == "workflow_dispatch" and .status == "completed" and .conclusion == "success"
               and .head_sha == $tip and (.run_attempt|tostring) == $attempt
               and .path == ".github/workflows/protected-refusal-reviewer.yml"' \
              "$root/run.json" >/dev/null
            gh api "repos/HansenHomeAI/deed-corpus-transparency-log/actions/runs/$run_id/artifacts?per_page=100" > "$root/artifacts.json"
            artifact_id="$(jq -er --arg name "deed-refusal-review-$request_id-registry-evidence" --arg run "$run_id" \
              '[.artifacts[] | select(.name == $name and .expired == false and (.workflow_run.id|tostring) == $run)]
               | if length == 1 then .[0].id else error("exact registry evidence artifact missing or duplicated") end' \
              "$root/artifacts.json")"
            gh api -H "Accept: application/vnd.github+json" \
              "repos/HansenHomeAI/deed-corpus-transparency-log/actions/artifacts/$artifact_id/zip" > "$root/registry-evidence.zip"
            test "$(unzip -Z1 "$root/registry-evidence.zip")" = registry-evidence.bundle
            unzip -p "$root/registry-evidence.zip" registry-evidence.bundle > "$root/registry-evidence.bundle"
            gh attestation verify "$root/registry-evidence.bundle" \
              --repo HansenHomeAI/deed-corpus-transparency-log \
              --signer-workflow HansenHomeAI/deed-corpus-transparency-log/.github/workflows/protected-refusal-reviewer.yml \
              --signer-digest "$tip" --source-ref refs/heads/main \
              --cert-oidc-issuer https://token.actions.githubusercontent.com --deny-self-hosted-runners \
              --format json > "$root/registry-evidence-attestation.json"
            node scripts/deed-bundle.mjs unpack --bundle "$root/registry-evidence.bundle" \
              --private-key "$RUNNER_TEMP/deed-registry-request-private.pem" --key-id "$REQUEST_KEY_ID" \
              --role evidence --request-id "$request_id" --out "$root/evidence"
            gh attestation verify "$root/evidence/review-index.json" \
              --repo HansenHomeAI/deed-corpus-transparency-log \
              --signer-workflow HansenHomeAI/deed-corpus-transparency-log/.github/workflows/protected-refusal-reviewer.yml \
              --signer-digest "$tip" --source-ref refs/heads/main \
              --cert-oidc-issuer https://token.actions.githubusercontent.com --deny-self-hosted-runners \
              --bundle "$root/evidence/review-index.sigstore.json" --format json \
              > "$root/review-index-attestation.json"
            node scripts/protected-refusal-reviewer.mjs derive-review-event \
              --root "$root/evidence" --reference "$root/reference.json" --out "$root/derived-event.json"
          fi

      - name: Verify the committed opaque chain before mutation
        run: node scripts/verify-index.mjs --index registry/index.json --ciphertext-dir registry/ciphertexts

      - name: Decrypt, validate, append, and re-encrypt one event
        id: append
        env:
          REGISTRY_AES_KEY_BASE64: ${{ secrets.DEED_REGISTRY_AES_KEY_BASE64 }}
          ENCRYPTED_REQUEST_BASE64URL: ${{ inputs.encrypted_request_base64url }}
          REQUEST_KEY_ID: ${{ vars.DEED_REGISTRY_REQUEST_KEY_ID }}
          STATE_KEY_ID: ${{ vars.DEED_REGISTRY_STATE_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$REGISTRY_AES_KEY_BASE64"
          test -n "$REQUEST_KEY_ID"
          test -n "$STATE_KEY_ID"
          derived_args=()
          if test -s "$RUNNER_TEMP/deed-registry-review-proof/derived-event.json"; then
            derived_args+=(--derived-review-event "$RUNNER_TEMP/deed-registry-review-proof/derived-event.json")
          fi
          APPEND_RESULT="$(node scripts/append-encrypted-registry.mjs \
            --index registry/index.json \
            --ciphertext-dir registry/ciphertexts \
            --request-private-key "$RUNNER_TEMP/deed-registry-request-private.pem" \
            --request-base64url "$ENCRYPTED_REQUEST_BASE64URL" \
            --request-key-id "$REQUEST_KEY_ID" \
            --state-key-id "$STATE_KEY_ID" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --workflow-ref "$GITHUB_WORKFLOW_REF" \
            --workflow-tip "$GITHUB_SHA" \
            "${derived_args[@]}" \
            --receipt-dir "$RUNNER_TEMP/deed-registry-receipt")"
          REQUEST_SHA256="$(printf '%s' "$APPEND_RESULT" | jq -er .requestSha256)"
          ARTIFACT_NAME="$(printf '%s' "$APPEND_RESULT" | jq -er .artifactName)"
          APPENDED="$(printf '%s' "$APPEND_RESULT" | jq -er '.appended|tostring')"
          test "$ARTIFACT_NAME" = "deed-registry-receipt-$REQUEST_SHA256"
          test "$APPENDED" = true || test "$APPENDED" = false
          printf 'request_sha256=%s\nartifact_name=%s\nappended=%s\n' \
            "$REQUEST_SHA256" "$ARTIFACT_NAME" "$APPENDED" >> "$GITHUB_OUTPUT"

      - name: Verify the complete opaque chain after mutation
        run: node scripts/verify-index.mjs --index registry/index.json --ciphertext-dir registry/ciphertexts

      - name: Attest the exact encrypted protected append receipt
        id: receipt_attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ runner.temp }}/deed-registry-receipt/receipt.encrypted.json
          show-summary: false

      - name: Retain the exact Sigstore bundle beside the encrypted receipt
        run: cp '${{ steps.receipt_attestation.outputs.bundle-path }}' "$RUNNER_TEMP/deed-registry-receipt/receipt.sigstore.json"

      - name: Upload replay-addressed encrypted receipt artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.append.outputs.artifact_name }}
          path: ${{ runner.temp }}/deed-registry-receipt
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

      - name: Fail the append after retaining its encrypted rejection receipt
        if: steps.append.outputs.appended == 'false'
        run: |
          echo "Protected semantic append rejected; inspect the attested caller-encrypted receipt." >&2
          exit 1

      - name: Attest the exact public index and every retained ciphertext
        if: steps.append.outputs.appended == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            registry/index.json
            registry/ciphertexts/*.bin

      - name: Commit and push the serialized append
        if: steps.append.outputs.appended == 'true'
        run: |
          set -euo pipefail
          git config user.name "deed-corpus-transparency[bot]"
          git config user.email "deed-corpus-transparency[bot]@users.noreply.github.com"
          git add registry/index.json registry/ciphertexts
          git diff --cached --quiet && exit 1
          git commit -m "registry: append encrypted custody envelope"
          git push origin HEAD:main

      - name: Remove secret key material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/deed-registry-request-private.pem"
          rm -rf "$RUNNER_TEMP/deed-registry-receipt"
          rm -rf "$RUNNER_TEMP/deed-registry-review-proof"
